<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f1f5f9; margin: 0; padding: 1.5rem; color: #1e293b; }
    .container { max-width: 640px; margin: 3rem auto; background: white; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    h1 { color: #1e40af; text-align: center; margin-bottom: 2rem; }
    .profile-card p { font-size: 1.1rem; margin: 1rem 0; }
    .profile-card strong { color: #1d4ed8; }
    .logout-btn { display: block; margin: 2rem auto 0; padding: 0.9rem 2rem; background: #ef4444; color: white; border: none; border-radius: 0.5rem; font-size: 1.05rem; cursor: pointer; }
    .logout-btn:hover { background: #dc2626; }
  </style>
</head>
<body>

  <div class="container">
    <h1>My Profile</h1>
    <div class="profile-card" id="profile"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script>
    async function loadProfile() {
      try {
        const res = await fetch('/api/students/me', { credentials: 'include' })
        if (res.status === 401) {
          location.href = 'login.html'
          return
        }
        if (!res.ok) throw new Error()

        const user = await res.json()
        document.getElementById('profile').innerHTML = `
          <p><strong>Student ID:</strong> ${user.student_id}</p>
          <p><strong>Name:</strong> ${user.full_name}</p>
          <p><strong>Email:</strong> ${user.email}</p>
          <p><strong>Department:</strong> ${user.department || '—'}</p>
          <p><strong>Batch:</strong> ${user.batch}</p>
          <p><strong>Registered:</strong> ${user.created_at ? new Date(user.created_at).toLocaleDateString('en-GB') : '—'}</p>
        `
      } catch {
        document.getElementById('profile').innerHTML = '<p style="color:#dc2626">Could not load profile. Please login again.</p>'
      }
    }

    function logout() {
      document.cookie = 'session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;'
      location.href = 'login.html'
    }

    loadProfile()
  </script>
</body>
</html>
