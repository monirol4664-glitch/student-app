<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Portal</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .student { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Register New Student</h3>
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="major" placeholder="Major">
        <input type="number" id="gpa" placeholder="GPA (e.g. 3.5)" step="0.1">
        <button onclick="addStudent()">Submit</button>
        
        <hr>
        <h3>Student List</h3>
        <div id="list">Loading...</div>
    </div>

    <script>
        const API_URL = 'https://college-api.monirol4664.workers.dev/';

        async function load() {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('list').innerHTML = data.map(s => `
                <div class="student">
                    <span><b>${s.name}</b> (${s.major})</span>
                    <span>${s.gpa}</span>
                </div>
            `).join('');
        }

        async function addStudent() {
            const payload = {
                name: document.getElementById('name').value,
                major: document.getElementById('major').value,
                gpa: parseFloat(document.getElementById('gpa').value)
            };

            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            
            // Clear inputs and refresh list
            document.getElementById('name').value = '';
            document.getElementById('major').value = '';
            document.getElementById('gpa').value = '';
            load();
        }

        load();
    </script>
</body>
</html>
