name: Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    # Make gradlew executable (ONLY needed if file exists)
    - name: Make gradlew executable
      run: chmod +x gradlew
      continue-on-error: true  # Won't fail if file missing
    
    # If wrapper missing, generate it
    - name: Setup Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "⚠️ gradlew not found, creating wrapper..."
          wget https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          wget https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.properties -O gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
        fi
    
    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
