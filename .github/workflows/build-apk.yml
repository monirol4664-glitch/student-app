name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: android-actions/setup-android@v3
      
      - name: Remove any old config files
        run: |
          rm -f capacitor.config.ts
          rm -f capacitor.config.js
          rm -f capacitor.config.json
      
      - name: Create fresh config file
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.student.app",
            "appName": "Student App",
            "webDir": "build"
          }
          EOF
      
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Build web app
        run: npm run build
      
      - name: Install Capacitor
        run: npm install -g @capacitor/cli
      
      - name: Initialize Capacitor (CORRECT SYNTAX)
        run: npx cap init "Student App" com.student.app --web-dir=build
      
      - name: Add Android
        run: npx cap add android
      
      - name: Sync
        run: npx cap sync
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with:
          name: student-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
