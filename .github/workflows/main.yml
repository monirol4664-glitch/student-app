name: Build Android APK
on: [push]

jobs:
  build:
    # Downgrading to 22.04 is the most stable way to build APKs right now
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev python3-pip libffi-dev libssl-dev \
            libltdl-dev libtool autoconf automake m4 bison flex cmake zip \
            unzip pkg-config zlib1g-dev openjdk-17-jdk libtinfo5

      - name: Install Buildozer & Cython
        run: |
          # Use Cython 0.29.33 for maximum compatibility with Kivy 2.3.0
          pip3 install --user --upgrade buildozer "Cython<3.0"
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          # The -v gives us the detailed log we need if this fails
          yes | buildozer -v android debug
        env:
          USER: runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plotter-APK
          path: bin/*.apk
          
