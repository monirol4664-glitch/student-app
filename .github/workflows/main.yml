name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python_version: '3.11'

      - name: Install Android Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev python3-pip libffi-dev libssl-dev \
            libltdl-dev libtool autoconf automake m4 bison flex cmake zip \
            unzip pkg-config zlib1g-dev openjdk-17-jdk libtinfo5 libncurses5 \
            libncursesw5-dev

      - name: Install Buildozer and Cython
        run: |
          # Cython 3.x is incompatible with Kivy 2.3.0, must use 0.29.33
          pip install --user --upgrade "buildozer" "Cython<3.0"
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # The 'yes' command auto-accepts all Android SDK licenses
          yes | buildozer -v android debug
        env:
          USER: runner

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: MathPlotter-Android-Package
          path: bin/*.apk
          
