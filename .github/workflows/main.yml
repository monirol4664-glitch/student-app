name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            python3-pip \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            libtool \
            autoconf \
            automake \
            m4 \
            bison \
            flex \
            cmake \
            zip \
            unzip \
            pkg-config \
            zlib1g-dev \
            openjdk-17-jdk

      - name: Install Buildozer
        run: |
          pip3 install --user --upgrade buildozer
          # Add local bin to path so we can run buildozer command
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: |
          # The 'yes |' automatically accepts the Android SDK licenses
          yes | buildozer android debug
        env:
          # This helps Buildozer find the Android SDK it will download
          USER: runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plotter-APK
          path: bin/*.apk
          
