name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # This is the official Kivy team action
        uses: kivy/buildozer-action@v1.5.0
        with:
          # This specifies the command to run
          command: buildozer android debug
          # This version matches the Python version in your spec file
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plotter-APK
          path: bin/*.apk
          
