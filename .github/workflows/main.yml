[app]
# ... (rest of your app info)
requirements = python3,hostpython3,kivy==master,numpy,sympy,mpmath

# ADD THIS LINE - It prevents SymPy from crashing due to missing unittest
android.whitelist = unittest/*

# Change these to ensure we use the stable NDK for these libraries
android.api = 31
android.minapi = 21
android.ndk = 25b
android.ndk_api = 21
