name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # This fixes the "Node 20" warning you saw
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev python3-pip libffi-dev libssl-dev libltdl-dev libtool autoconf automake m4 bison flex cmake zip unzip pkg-config zlib1g-dev openjdk-17-jdk

      - name: Install Buildozer & Cython
        run: |
          # Specifically installing Cython 0.29.33 (most stable for Kivy/Buildozer)
          pip3 install --user --upgrade buildozer "Cython<3.0"
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          # Use -v to get full logs if it fails
          yes | buildozer -v android debug
        env:
          USER: runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plotter-APK
          path: bin/*.apk
          
