name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04  # Using a specific stable Ubuntu version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # Using the exact casing and version from the official repo
        uses: Kivy/buildozer-action@master 
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plotter-APK
          path: bin/*.apk
          
