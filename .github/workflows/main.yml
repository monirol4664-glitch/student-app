name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev python3-pip \
          libffi-dev libssl-dev libltdl-dev libtool autoconf automake m4 \
          bison flex cmake zip unzip pkg-config zlib1g-dev openjdk-17-jdk \
          libtinfo5 libncurses5 libncursesw5-dev

      - name: Install Buildozer & Cython
        run: |
          # Cython 0.29.33 is the ONLY version that consistently builds NumPy for Android
          pip install --user --upgrade "buildozer" "Cython==0.29.33"
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          # Clean buildozer's internal cache before starting
          buildozer android clean
          yes | buildozer -v android debug
        env:
          USER: runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plotter-APK
          path: bin/*.apk
          
