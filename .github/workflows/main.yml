name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev libltdl-dev libtool autoconf automake m4 bison flex cmake zip unzip pkg-config zlib1g-dev openjdk-17-jdk libtinfo5 libncurses5

      - name: Install Buildozer & Cython
        run: |
          pip install --user --upgrade "buildozer" "Cython<3.0"
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          buildozer android clean
          yes | buildozer -v android debug
        env:
          USER: runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Graph-Plotter
          path: bin/*.apk
          
