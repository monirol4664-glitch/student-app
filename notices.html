<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices - Your College</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .notice-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .notice-item {
            display: none;
            background: #f8f9fa;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid #3498db;
            border-radius: 5px;
        }
        .notice-item.active {
            display: block;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <!-- Same navbar as index.html -->
    <nav class="navbar">...</nav>

    <main class="notice-container">
        <h1>Latest Notices</h1>
        <div class="notice-item active">
            <h3>Admission 2026 Open</h3>
            <p>Applications for B.Sc and B.A programs now open until March 31st.</p>
            <small>Posted: March 8, 2026</small>
        </div>
        <div class="notice-item">
            <h3>Exam Schedule Released</h3>
            <p>Midterm exam schedule available for download.</p>
            <small>Posted: March 5, 2026</small>
        </div>
        <!-- Add more notices -->
    </main>

    <script src="js/main.js"></script>
    <script>rotateNotices();</script>
    <script src="js/auth.js"></script>  <!-- NEW FILE BELOW -->
</body>
</html>
