<!DOCTYPE html>
<html>
<head>
  <title>Student Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-12">
  <div class="max-w-4xl mx-auto px-4">
    <h1 class="text-5xl font-bold text-center mb-12 bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
      Student Management
    </h1>
    
    <div id="loading" class="text-center py-16">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
      <p class="mt-4 text-xl text-gray-600">Loading students...</p>
    </div>
    
    <div id="students" class="grid gap-6 hidden">
      <!-- Students load here -->
    </div>
    
    <div id="error" class="hidden text-center py-12 text-red-600">
      <p>Failed to load students. Check API connection.</p>
    </div>
  </div>

  <script>
    // REPLACE WITH YOUR WORKER URL
    const API_URL = 'https://your-worker.student-management-api.workers.dev';
    
    fetch(`${API_URL}/api/students`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').classList.add('hidden');
        const container = document.getElementById('students');
        
        if (data.students && data.students.length > 0) {
          container.innerHTML = data.students.map(student => `
            <div class="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 border border-gray-100">
              <div class="flex items-start justify-between">
                <div>
                  <h2 class="text-2xl font-bold text-gray-900 mb-2">${student.name}</h2>
                  <p class="text-lg text-gray-600 mb-2">${student.email}</p>
                  <p class="text-sm text-gray-500">
                    Enrolled: ${new Date(student.enrollment_date).toLocaleDateString()}
                  </p>
                </div>
                <span class="text-xs bg-blue-100 text-blue-800 px-3 py-1 rounded-full">
                  ID: ${student.id}
                </span>
              </div>
            </div>
          `).join('');
          container.classList.remove('hidden');
        } else {
          document.getElementById('error').classList.remove('hidden');
        }
      })
      .catch(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      });
  </script>
</body>
</html>
