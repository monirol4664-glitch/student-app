<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-12 px-4">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-12 bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
      🎓 Student Management
    </h1>
    
    <div id="loading" class="text-center py-16">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
      <p class="mt-4 text-xl text-gray-600 font-medium">Loading students from database...</p>
    </div>
    
    <div id="students" class="grid gap-6 hidden">
      <!-- Students appear here -->
    </div>
    
    <div id="error" class="hidden bg-red-50 border border-red-200 rounded-2xl p-8 text-center">
      <div class="text-6xl mb-4">⚠️</div>
      <h2 class="text-2xl font-bold text-red-800 mb-2">Failed to load students</h2>
      <p class="text-red-700">Database connection failed. Please check backend Worker.</p>
    </div>
  </div>

  <script>
    // ⚠️ REPLACE WITH YOUR WORKER URL (from Workers & Pages dashboard)
    const API_URL = 'https://student-app.monirol4664.workers.dev/';
    
    fetch(`${API_URL}/api/students`)
      .then(res => {
        if (!res.ok) throw new Error('API failed');
        return res.json();
      })
      .then(data => {
        document.getElementById('loading').classList.add('hidden');
        const container = document.getElementById('students');
        
        if (data.students?.length > 0) {
          container.innerHTML = data.students.map(student => `
            <div class="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 border border-gray-100 hover:-translate-y-1">
              <div class="flex items-start justify-between gap-4">
                <div class="flex-1">
                  <h2 class="text-2xl font-bold text-gray-900 mb-2">${student.name}</h2>
                  <p class="text-lg text-gray-600 mb-3">${student.email}</p>
                  <div class="flex items-center gap-4 text-sm text-gray-500">
                    <span>📅 Enrolled: ${new Date(student.enrollment_date).toLocaleDateString()}</span>
                  </div>
                </div>
                <div class="text-right">
                  <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">
                    ID: ${student.id}
                  </span>
                </div>
              </div>
            </div>
          `).join('');
          container.classList.remove('hidden');
        } else {
          container.innerHTML = `
            <div class="col-span-full text-center py-16">
              <div class="text-6xl mb-4">📭</div>
              <h2 class="text-2xl font-bold text-gray-700 mb-2">No students found</h2>
              <p class="text-gray-500">Database is empty. Add students via backend API.</p>
            </div>
          `;
          container.classList.remove('hidden');
        }
      })
      .catch(error => {
        console.error('API Error:', error);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      });
  </script>
</body>
</html>
