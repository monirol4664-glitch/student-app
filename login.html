<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #f8f9fa;">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Student App</div>
            <ul class="nav-menu">
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <main style="max-width:400px;margin:120px auto;padding:2rem;">
        <h1 style="text-align:center;margin-bottom:2rem;">Login</h1>
        <form id="loginForm" style="background:white;padding:2rem;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);">
            <div style="margin-bottom:1.5rem;">
                <label>Email</label>
                <input type="email" name="email" required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:5px;">
            </div>
            <div style="margin-bottom:2rem;">
                <label>Password</label>
                <input type="password" name="password" required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:5px;">
            </div>
            <button type="submit" style="width:100%;padding:12px;background:#3498db;color:white;border:none;border-radius:5px;font-size:1.1rem;cursor:pointer;">Login</button>
            <p id="loginMessage" style="margin-top:1rem;color:red;text-align:center;"></p>
        </form>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const form = e.target;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: form.email.value,
                    password: form.password.value
                })
            });
            const data = await res.json();
            const msg = document.getElementById('loginMessage');
            if (res.ok) {
                msg.style.color = 'green';
                msg.textContent = 'Login successful! Redirecting...';
                setTimeout(() => window.location.href = '/index.html', 1000);
            } else {
                msg.style.color = 'red';
                msg.textContent = data.error || 'Login failed';
            }
        });
    </script>
</body>
</html>
