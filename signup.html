<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Student App</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 120px auto; padding: 2rem; }
        .auth-form { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .auth-form h1 { text-align: center; margin-bottom: 2rem; color: #2c3e50; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }
        .auth-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #3498db, #2980b9); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .auth-btn:hover { transform: translateY(-2px); }
        .message { margin-top: 1rem; text-align: center; padding: 10px; border-radius: 5px; font-weight: 500; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .auth-link { text-align: center; margin-top: 1.5rem; }
        .auth-link a { color: #3498db; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Student App</div>
            <ul class="nav-menu">
                <li><a href="signup.html" class="active">Sign Up</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-form">
            <h1>🎓 Create Account</h1>
            <form id="signupForm">
                <div class="form-group">
                    <label for="email">Student Email</label>
                    <input type="email" id="email" name="email" placeholder="student@college.edu" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Minimum 6 characters" minlength="6" required>
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
                <div id="signupMessage" class="message" style="display: none;"></div>
            </form>
            <div class="auth-link">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const messageEl = document.getElementById('signupMessage');
            messageEl.style.display = 'block';
            messageEl.className = 'message';
            messageEl.textContent = 'Creating account...';

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.className = 'message success';
                    messageEl.textContent = 'Account created! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    messageEl.className = 'message error';
                    messageEl.textContent = data.error || 'Signup failed';
                }
            } catch (error) {
                messageEl.className = 'message error';
                messageEl.textContent = 'Network error. Please try again.';
            }
        });
    </script>
</body>
</html>
