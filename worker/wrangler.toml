name = "portfolio-api-worker"
main = "index.js"
compatibility_date = "2024-01-01" # Use a recent date

[d1_databases]
binding = "DB" # Matches the 'DB' used in worker/index.js
database_name = "portfolio_db"
database_id = "YOUR_D1_DATABASE_ID_HERE" # You set this up when creating D1
preview_database_id = "YOUR_PREVIEW_ID_HERE" # Optional for local testing